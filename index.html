<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DravenCool Portal - Gaming Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; 
            color: white;
        }
        
        #main { padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 32px; }
        
        .stats { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 30px; 
            flex-wrap: wrap;
        }
        .stat { 
            background: rgba(255,255,255,0.15); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center;
            min-width: 120px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .stat-num { font-size: 28px; font-weight: bold; color: #ffd700; }
        .stat-label { font-size: 12px; opacity: 0.8; margin-top: 5px; }
        
        .search-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .search-container input {
            width: 90%;
            max-width: 500px;
            padding: 12px;
            font-size: 16px;
            border-radius: 25px;
            border: 2px solid #ffd700;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .search-container input::placeholder { color: rgba(255,255,255,0.5); }
        
        .games { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; 
            max-width: 1600px; 
            margin: 0 auto;
            padding: 10px;
        }
        .game { 
            background: rgba(255,255,255,0.08); 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            text-align: center;
            transition: all 0.3s;
            border: 2px solid transparent;
            backdrop-filter: blur(10px);
        }
        .game:hover { 
            transform: translateY(-5px); 
            background: rgba(255,255,255,0.15);
            border-color: #ffd700;
            box-shadow: 0 5px 20px rgba(255,215,0,0.3);
        }
        .game-icon { font-size: 38px; margin-bottom: 8px; }
        .game-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .game-source { font-size: 11px; opacity: 0.7; margin-top: 5px; color: #ffd700; }
        .game-badges { font-size: 10px; margin-top: 5px; }
        .game-badge { 
            display: inline-block;
            background: rgba(255,215,0,0.2); 
            color: #ffd700;
            padding: 2px 6px; 
            border-radius: 10px; 
            margin: 2px;
        }
        .broken { border-color: #ff6b6b !important; opacity: 0.5; }
        
        .filter { 
            text-align: center; 
            margin-bottom: 20px; 
            overflow-x: auto;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        .filter button { 
            background: rgba(255,255,255,0.15); 
            margin: 2px;
            border: 1px solid rgba(255,215,0,0.3);
            padding: 8px 15px;
            font-size: 13px;
            white-space: nowrap;
        }
        .filter button.active { 
            background: #ffd700; 
            color: #333;
            border-color: #ffd700;
        }
        
        .category-info { 
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .games { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            h1 { font-size: 24px; }
            .game-icon { font-size: 32px; }
            .stat { min-width: 80px; padding: 12px; }
        }
    </style>
</head>

        let currentFilter = 'all';

        let visits = localStorage.getItem('visits') || 0;
        visits++;
        localStorage.setItem('visits', visits);
        document.getElementById('visits').textContent = visits;
        document.getElementById('total').textContent = games.length;
        document.getElementById('working').textContent = games.filter(g => g.w).length;

        function renderGames() {
            const list = document.getElementById('gameList');
            list.innerHTML = '';
            let count = 0;
            
            games.forEach(game => {
                const matchesFilter = currentFilter === 'all' || 
                    (currentFilter === 'working' && game.w) || 
                    currentFilter === game.s ||
                    currentFilter === game.c;
                    
                const matchesSearch = searchQuery === '' || 
                    game.t.toLowerCase().includes(searchQuery.toLowerCase());
                
                if (matchesFilter && matchesSearch) {
                    count++;
                    const div = document.createElement('div');
                    div.className = 'game' + (!game.w ? ' broken' : '');
                    div.onclick = () => playGame(game);
                    div.innerHTML = `
                        <div class="game-icon">${game.i || '🎮'}</div>
                        <div class="game-title">${game.t}</div>
                        <div class="game-source">${game.s}</div>
                    `;
                    list.appendChild(div);
                }
            });
            
            const info = document.getElementById('categoryInfo');
            if (count === 0) {
                info.textContent = '❌ No games found. Try a different filter or search.';
            } else {
                info.textContent = `✅ Showing ${count} ${currentFilter !== 'all' ? currentFilter : 'total'} game(s)`;
            }
        }

        function filter(type) {
            currentFilter = type;
            searchQuery = '';
            document.getElementById('searchBox').value = '';
            document.querySelectorAll('.filter button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGames();
        }

        function searchGames() {
            searchQuery = document.getElementById('searchBox').value;
            currentFilter = 'all';
            document.querySelectorAll('.filter button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.filter button')[0].classList.add('active');
            renderGames();
        }

        function playGame(game) {
            // Open game in new tab instead of iframe
            window.open(game.u, '_blank');
        }

        function closeGame() {
            // No longer needed since games open in new tabs
        }

        // Initialize
        renderGames();
    </script>
</body>
</html>
