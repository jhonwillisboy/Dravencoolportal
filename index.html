<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DravenCool Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; 
            color: white;
        }
        
        #lock { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000;
        }
        .lock-box { 
            background: white; 
            color: black; 
            padding: 40px; 
            border-radius: 10px; 
            text-align: center; 
        }
        input { 
            padding: 10px; 
            margin: 10px 0; 
            width: 200px; 
            font-size: 16px;
        }
        button { 
            padding: 10px 20px; 
            background: #667eea; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-size: 16px;
            margin: 5px;
        }
        button:hover { background: #764ba2; }
        
        #main { display: none; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; }
        
        .stats { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 30px; 
            flex-wrap: wrap;
        }
        .stat { 
            background: rgba(255,255,255,0.2); 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center;
            min-width: 100px;
        }
        .stat-num { font-size: 24px; font-weight: bold; color: #ffd700; }
        
        .games { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; 
            max-width: 1400px; 
            margin: 0 auto;
        }
        .game { 
            background: rgba(255,255,255,0.1); 
            padding: 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            text-align: center;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }
        .game:hover { 
            transform: scale(1.05); 
            background: rgba(255,255,255,0.2);
            border-color: #ffd700;
        }
        .game-icon { font-size: 40px; margin-bottom: 10px; }
        .game-title { font-weight: bold; font-size: 14px; }
        .game-source { font-size: 12px; opacity: 0.8; margin-top: 5px; }
        .broken { border-color: #ff4757 !important; opacity: 0.6; }
        
        #player { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: black; 
            z-index: 999;
            padding: 10px;
        }
        .player-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        iframe { 
            width: 100%; 
            height: calc(100% - 60px); 
            border: none; 
            background: #111;
        }
        .error-msg { 
            display: none; 
            text-align: center; 
            padding: 50px; 
            color: #ff6b6b;
        }
        
        .filter { text-align: center; margin-bottom: 20px; }
        .filter button { background: rgba(255,255,255,0.2); margin: 0 5px; }
        .filter button.active { background: #ffd700; color: black; }
        
        .load-more { 
            text-align: center; 
            margin-top: 30px; 
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="lock">
        <div class="lock-box">
            <h2>🔒 DravenCool Portal</h2>
            <p>Enter password to continue</p>
            <input type="password" id="pwd" placeholder="Password" onkeypress="if(event.key==='Enter')checkPwd()">
            <br>
            <button onclick="checkPwd()">Enter</button>
            <p id="err" style="color:red;display:none;margin-top:10px;">Wrong password!</p>
        </div>
    </div>

    <div id="main">
        <h1>🎮 DravenCool Ultra Portal</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-num" id="visits">0</div>
                <div>Visits</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="online">1</div>
                <div>Online</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="total">0</div>
                <div>Games</div>
            </div>
        </div>

        <div class="filter">
            <button class="active" onclick="filter('all')">All</button>
            <button onclick="filter('working')">Working</button>
            <button onclick="filter('1kh0')">1kh0</button>
            <button onclick="filter('emu')">Emulators</button>
            <button onclick="filter('coolmath')">Cool Math</button>
            <button onclick="filter('io')">.io</button>
        </div>

        <div class="games" id="gameList"></div>
    </div>

    <div id="player">
        <div class="player-header">
            <h3 id="pTitle">Game</h3>
            <div>
                <span id="load" style="margin-right:20px;">Loading...</span>
                <button onclick="closeGame()" style="background:#ff4757;">✕ Close</button>
            </div>
        </div>
        <iframe id="frame"></iframe>
        <div id="errFrame" class="error-msg">
            <h2>⚠️ Game Blocked or Broken</h2>
            <p>This game doesn't work on your network.</p>
            <button onclick="closeGame()">Back to Games</button>
        </div>
    </div>

        function checkPwd() {
            const pwd = document.getElementById('pwd').value;
            if (pwd === 'draven') {
                document.getElementById('lock').style.display = 'none';
                document.getElementById('main').style.display = 'block';
                renderGames();
            } else {
                document.getElementById('err').style.display = 'block';
            }
        }

        function renderGames() {
            const list = document.getElementById('gameList');
            list.innerHTML = '';
            games.forEach(game => {
                if (currentFilter === 'all' || 
                    (currentFilter === 'working' && game.w) || 
                    currentFilter === game.s) {
                    const div = document.createElement('div');
                    div.className = 'game' + (!game.w ? ' broken' : '');
                    div.onclick = () => playGame(game);
                    div.innerHTML = `
                        <div class="game-icon">🎮</div>
                        <div class="game-title">${game.t}</div>
                        <div class="game-source">${game.s}</div>
                    `;
                    list.appendChild(div);
                }
            });
        }

        function filter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGames();
        }

        function playGame(game) {
            document.getElementById('pTitle').textContent = game.t;
            document.getElementById('player').style.display = 'block';
            document.getElementById('main').style.display = 'none';
            document.getElementById('load').style.display = 'inline';
            document.getElementById('errFrame').style.display = 'none';
            const frame = document.getElementById('frame');
            frame.src = game.u;
            frame.onload = () => {
                document.getElementById('load').style.display = 'none';
            };
            frame.onerror = () => {
                document.getElementById('load').style.display = 'none';
                document.getElementById('errFrame').style.display = 'block';
            };
        }

        function closeGame() {
            document.getElementById('player').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            document.getElementById('frame').src = '';
        }

        renderGames();
